name: Test make_lj_mock.py runs with synthetic halos (latest release of opencosmo)

on:
  workflow_dispatch: null
  schedule:
    # Runs "every Monday & Thursday at 3:05am Central"
    - cron: '5 8 * * 1,4'
  push:
    branches:
      - main
  pull_request: null

jobs:
  mock-generation:
    name: python make_lj_mock.py testing_lj_mock_config.yaml
    runs-on: "ubuntu-latest"

    steps:
      - name: free disk space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          rm_cmd: "rmz"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: 3.11
          channels: conda-forge
          channel-priority: strict
          show-channel-urls: true
          miniforge-version: latest

      - name: configure conda and install code
        shell: bash -l {0}
        env:
          GITHUB_TOKEN: ${{ secrets.CPAC_PRIVATE_REPO_TOKEN }}
          GITHUB_USER: ${{ secrets.GH_USR_TESTING_TOKEN }}
          GH_TOKEN: ${{ secrets.CPAC_PRIVATE_REPO_TOKEN }}

        run: |
          conda config --set always_yes yes
          conda install --quiet \
            --file=requirements.txt
          conda install --quiet \
            pip \
            setuptools \
            "setuptools_scm>=7,<8" \
            matplotlib \
            astropy \
            h5py \
            mpi4py \
            mpich \
            pytest \
            opencosmo
          conda install hdf5plugin=5.0
          conda uninstall diffmah --force
          conda uninstall diffstar --force
          conda uninstall dsps --force
          conda uninstall diffhalos --force
          pip install --no-deps --no-build-isolation git+https://github.com/ArgonneCPAC/diffmah.git
          pip install --no-deps --no-build-isolation git+https://github.com/ArgonneCPAC/diffstar.git
          pip install --no-deps --no-build-isolation git+https://github.com/ArgonneCPAC/dsps.git
          pip install --no-deps --no-build-isolation git+https://github.com/ArgonneCPAC/diffhalos.git

          pip install git+https://github.com/AstroPatty/diffpipe.git

          python -m pip install --no-build-isolation --no-deps -e .

      - name: check opencosmo version
        shell: bash -l {0}
        run: |
          OPENCOSMO_CURRENT_VERSION=$(gh release view --repo ArgonneCPAC/OpenCosmo --json tagName --jq .tagName)
          OPENCOSMO_INSTALLED_VERSION=$(conda list opencosmo | awk 'NR==4 {print $2}')
          if [[ "$OPENCOSMO_CURRENT_VERSION" != "$OPENCOSMO_INSTALLED_VERSION" ]]; then
            echo "Error: installed opencosmo ${OPENCOSMO_LATEST_VERSION} but latest version is ${OPENCOSMO_CURRENT_VERSION}"
            exit 1
          else
            echo "Successfully installed opencosmo ${OPENCOSMO_LATEST_VERSION}"
          fi
      
        
      - name: download dsps data
        shell: bash -l {0}
        run: |
          # Create data directory
          mkdir -p dsps_drn/filters

          # Download data
          cd dsps_drn
          wget https://portal.nersc.gov/project/hacc/aphearin/DSPS_data/ssp_data_fsps_v3.2_emlines.sparse.hdf5
          cd filters
          wget https://portal.nersc.gov/project/hacc/aphearin/DSPS_data/filters/lsst_u_transmission.h5
          wget https://portal.nersc.gov/project/hacc/aphearin/DSPS_data/filters/lsst_g_transmission.h5
          wget https://portal.nersc.gov/project/hacc/aphearin/DSPS_data/filters/lsst_r_transmission.h5
          wget https://portal.nersc.gov/project/hacc/aphearin/DSPS_data/filters/lsst_i_transmission.h5
          wget https://portal.nersc.gov/project/hacc/aphearin/DSPS_data/filters/lsst_z_transmission.h5
          wget https://portal.nersc.gov/project/hacc/aphearin/DSPS_data/filters/lsst_y_transmission.h5
          cd ..
          cd ..

          # Set environment variable
          export DSPS_DRN="${GITHUB_WORKSPACE}/dsps_drn"
          echo "DSPS_DRN=${DSPS_DRN}" >> $GITHUB_ENV

      - name: create mock with cosmos_fit option
        shell: bash -l {0}
        run: |
          # Create output directory
          mkdir -p ci_test_output

          # Run mock production script
          mpiexec -n 1 python scripts/LJ_LC_MOCKS/make_lj_mock.py scripts/LJ_LC_MOCKS/testing_lj_mock_config.yaml

      - name: verify script completed
        shell: bash -l {0}
        run: |
          echo "make_lj_mock.py ran successfully for testing_lj_mock_config.yaml"

      - name: validate mock
        shell: bash -l {0}
        run: |
          python scripts/LJ_LC_MOCKS/inspect_lc_mock.py ci_test_output/dummy_version_name

      - name: Create dummy diffsky galaxies for OpenCosmo
        shell: bash -l {0}
        run: |
          python scripts/LJ_LC_MOCKS/create_dummy_mock_data.py ci_test_output/dummy_version_name

      - name: OpenCosmo toolkit data conversion
        shell: bash -l {0}
        run: |
          mkdir -p ci_test_output/oc_dummy_version_name
          cp ci_test_output/dummy_version_name/* ci_test_output/oc_dummy_version_name/
          rm -rf ci_test_output/oc_dummy_version_name/lc_cores*.hdf5
          diffpipe run ci_test_output/dummy_version_name ci_test_output/oc_dummy_version_name -n 2

      - name: Run tests on OpenCosmo-formatted data
        shell: bash -l {0}
        run: |
          export RUN_OPENCOSMO_TESTS="true"
          export OPENCOSMO_DIFFSKY_DATA_PATH="ci_test_output/oc_dummy_version_name"
          pytest diffsky/data_loaders/opencosmo_utils/test
          

      - name: remove cosmos_fit mock
        shell: bash -l {0}
        run: |
          rm -rf ci_test_output

      - name: Clean up mock data
        shell: bash -l {0}
        run: |
          rm -rf ci_test_output

